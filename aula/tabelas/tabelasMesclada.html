<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas Mescladas</title>
</head>
<body>
    
    <table border="6">

        <thead>
            <tr>
                <th colspan="3">Lista de Filmes</th>
            </tr>

            <tr>
                <th>Gênero</th>
                <th>Filme</th>
                <th>Ano</th>
                <th>Nota</th>
            </tr>

        </thead>

        <tbody>
            
            <tr>
            <td rowspan="2">Drama</td>
            <td>O poderoso chefão</td>
            <td>1972</td>
            <td>9</td>
            </tr>

            <tr>
                <td>Filme</td>
                <td>2026</td>
                <td>10</td>
            </tr>

            <tr>
                <td rowspan="3">Terror</td>
                <td>Todo mundo em Pânico 7</td>
                <td>2026</td>
                <td>10</td>
            </tr>

        </tbody>

    </table>

</body>
</html>
